<section class="card">
  <h2>Nova palavra-passe</h2>
  <p>Defina uma nova palavra-passe para a sua conta.</p>

  <form (submit)="$event.preventDefault(); submit()">
    <label>
      <span>Nova palavra-passe</span>
      <input [(ngModel)]="password" name="password" type="password" autocomplete="new-password" />
    </label>

    <label>
      <span>Confirmar palavra-passe</span>
      <input
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        type="password"
        autocomplete="new-password"
      />
    </label>

    @if (error()) {
      <p class="feedback-error">{{ error() }}</p>
    }
    @if (success()) {
      <p class="feedback-success">{{ success() }}</p>
    }

    <button type="submit" [disabled]="loading() || !token">
      {{ loading() ? 'A guardar…' : 'Guardar palavra-passe' }}
    </button>
  </form>

  <p class="footer-link"><a routerLink="/login">Voltar ao login</a></p>
</section>
