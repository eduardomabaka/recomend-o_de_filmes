<section class="card">
  <h2>Recuperar palavra-passe</h2>
  <p>Indique o email da conta. Se existir registo, receberá um link para definir uma nova palavra-passe.</p>

  <form (submit)="$event.preventDefault(); submit()">
    <label>
      <span>Email</span>
      <input [(ngModel)]="email" name="email" type="email" autocomplete="email" />
    </label>

    @if (error()) {
      <p class="feedback-error">{{ error() }}</p>
    }
    @if (success()) {
      <p class="feedback-success">{{ success() }}</p>
    }

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'A enviar…' : 'Enviar instruções' }}
    </button>
  </form>

  <p class="footer-link"><a routerLink="/login">Voltar ao login</a></p>
</section>
