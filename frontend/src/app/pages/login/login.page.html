<section class="card">
  <h2>Entrar</h2>
  <p>Use o email e palavra-passe.</p>

  <form (submit)="$event.preventDefault(); submit()">
    <label>
      <span>Email</span>
      <input [(ngModel)]="email" name="email" type="email" />
    </label>

    <label>
      <span>Palavra-passe</span>
      <input
        [(ngModel)]="password"
        name="password"
        type="password"
      />
    </label>

    <p class="forgot-row"><a routerLink="/forgot-password">Esqueceu a senha?</a></p>

    @if (error()) {
      <p class="form-error">{{ error() }}</p>
    }
    @if (success()) {
      <p class="feedback-success">{{ success() }}</p>
    }

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'A entrar...' : 'Entrar' }}
    </button>
  </form>
</section>
