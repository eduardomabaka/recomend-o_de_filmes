<section class="header">
  <div>
    <h2>Pesquisar</h2>
    <p>Procure filmes pelo título.</p>
  </div>
</section>

<form class="form" (submit)="$event.preventDefault(); submit()">
  <input [ngModel]="q()" (ngModelChange)="q.set($event)" name="q" placeholder="Ex.: Inception" />
  <select [value]="lang()" (change)="lang.set(($any($event.target).value))">
    <option value="pt-PT">pt-PT</option>
    <option value="en-US">en-US</option>
  </select>
  <button type="submit">Pesquisar</button>
</form>

@if (!q().trim()) {
  <div class="hint">Digite algo para pesquisar.</div>
} @else {
  @if (loading()) {
    <div class="loading">A carregar…</div>
  } @else if (error()) {
    <div class="error">{{ error() }}</div>
  } @else if (results()?.results?.length) {
    <div class="grid">
      @for (m of results()?.results; track m.id) {
        <app-movie-card
          [movie]="m"
          [showFavoriteButton]="auth.isLoggedIn()"
          [favorite]="favoriteIds().includes(m.id)"
          (favoriteToggle)="onFavoriteToggle(m)"
          (movieClick)="onMovieClick(m)"
        />
      }
    </div>
  } @else {
    <div class="hint">Nenhum filme encontrado.</div>
  }
}
