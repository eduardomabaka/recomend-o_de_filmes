<div class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/">F Zone</a>
    <nav class="nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Populares</a>
      <a routerLink="/search" routerLinkActive="active">Pesquisar</a>
      <a routerLink="/favorites" routerLinkActive="active">Favoritos</a>
    </nav>
    <nav class="auth">
      <a routerLink="/login" routerLinkActive="active">Entrar</a>
      <a class="btn" routerLink="/register">Criar conta</a>
    </nav>
  </header>

  <main class="container">
    <router-outlet />
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p>F Zone - Recomendacao de filmes</p>
      <p>Dados: TMDB | Projeto academico</p>
      <p>&copy; 2026 F Zone</p>
    </div>
  </footer>
</div>
