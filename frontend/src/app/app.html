<div class="app-shell">
  <header class="topbar">
    <div class="brand" aria-label="F Zone">
      <img class="brand-logo" src="favicon.svg" width="40" height="40" alt="" />
    </div>
    <nav class="nav">
      <a routerLink="/popular" routerLinkActive="active">Populares</a>
      @if (!auth.isLoggedIn()) {
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Início</a>
      }
      @if (auth.isLoggedIn()) {
        <a routerLink="/profile" routerLinkActive="active">Perfil</a>
        <a routerLink="/search" routerLinkActive="active">Pesquisar</a>
        <a routerLink="/favorites" routerLinkActive="active">Favoritos</a>
      }
    </nav>
    <nav class="auth">
      <button
        class="theme-toggle"
        type="button"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.mode() === 'dark' ? 'Ativar modo claro' : 'Ativar modo escuro'"
        [attr.aria-pressed]="theme.mode() === 'light'"
        [title]="theme.mode() === 'dark' ? 'Modo claro' : 'Modo escuro'"
      >
        <span class="theme-toggle-track" aria-hidden="true">
          <span class="theme-toggle-thumb"></span>
        </span>
        <span class="theme-toggle-label">{{ theme.mode() === 'dark' ? 'Dark' : 'Light' }}</span>
      </button>
      @if (auth.isLoggedIn()) {
        <button class="logout-btn" type="button" (click)="logout()">Sair</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Entrar</a>
        <a class="btn" routerLink="/register">Criar conta</a>
      }
    </nav>
  </header>

  <main class="container">
    <router-outlet />
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p>F Zone - Recomendacao de filmes</p>
      <p>Dados: TMDB | Projeto academico</p>
      <p>&copy; 2026 F Zone</p>
    </div>
  </footer>
</div>
